name: Keep Streamlit app awake

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium
        run: |
          pip install --upgrade pip
          pip install playwright==1.48.0
          playwright install --with-deps chromium

      - name: Wake app if sleeping
        env:
          APP_URL: ${{ vars.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::La variable de repo STREAMLIT_APP_URL n'est pas définie (Settings > Secrets and variables > Actions > Variables)."
            exit 1
          fi
          python - <<'PY'
          import os
          import re
          import sys
          from playwright.sync_api import sync_playwright, TimeoutError as PWTimeout

          URL = os.environ["APP_URL"]
          WAKE_PATTERN = re.compile(r"get this app back up", re.IGNORECASE)

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context()
              page = context.new_page()

              try:
                  page.goto(URL, wait_until="domcontentloaded", timeout=60_000)
              except Exception as e:
                  print(f"App injoignable: {e}", file=sys.stderr)
                  browser.close()
                  sys.exit(1)

              wake_button = page.get_by_role("button", name=WAKE_PATTERN)
              try:
                  wake_button.wait_for(state="visible", timeout=5_000)
              except PWTimeout:
                  print("App déjà éveillée, rien à faire.")
                  browser.close()
                  sys.exit(0)

              print("Page de sommeil détectée — clic sur le bouton de réveil.")
              wake_button.click()

              try:
                  wake_button.wait_for(state="hidden", timeout=120_000)
                  print("App réveillée avec succès.")
              except PWTimeout:
                  print("Le bouton de réveil n'a pas disparu dans les 120 s.", file=sys.stderr)
                  browser.close()
                  sys.exit(1)

              browser.close()
          PY
